{% extends "games/base.html" %}

{% block content %}

<div style="max-width:400px;margin:auto;text-align:center;padding:20px;">
  <h2>💳 Fake Payment</h2>

  <h3>{{ game.title }}</h3>
  <p>Price: ${{ game.price }}</p>

  <form method="POST">
    {% csrf_token %}

    <input type="text" placeholder="Card Number" required><br><br>
    <input type="text" placeholder="Expiry (MM/YY)" required><br><br>
    <input type="text" placeholder="CVV" required><br><br>

    <button type="submit" class="btn purchase-btn">
      Pay Now
    </button>
  </form>

  <br>
  <a href="{% url 'game_detail' game.id %}">Cancel</a>
</div>

{% endblock %}
